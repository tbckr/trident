rules:
  - id: trident-no-double-percent-w
    languages: [go]
    severity: ERROR
    message: >-
      Don't put two `%w` verbs in a single `fmt.Errorf`. Since Go 1.20 that
      creates a multi-error, which is not what services in this project want.
      Wrap exactly one sentinel with `%w` and format the inner error with `%v`.
      Example: `fmt.Errorf("%w: ...: %v", services.ErrXxx, err)`.
    metadata:
      category: correctness
      confidence: HIGH
    patterns:
      - pattern: fmt.Errorf("$FMT", ...)
      - metavariable-regex:
          metavariable: $FMT
          regex: '.*%w.*%w.*'
