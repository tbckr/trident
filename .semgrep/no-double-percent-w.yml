rules:
  - id: trident-no-double-percent-w
    languages: [go]
    severity: ERROR
    message: >-
      Two `%w` verbs in one fmt.Errorf create a Go 1.20+ multi-error. Project
      convention: wrap one sentinel with `%w` and format the inner error with `%v`.
      Pattern: `fmt.Errorf("%w: ...: %v", services.ErrXxx, err)`.
      See CLAUDE.md "Other > fmt.Errorf single sentinel".
    metadata:
      category: correctness
      claude-md-ref: "Other > fmt.Errorf single sentinel"
      confidence: HIGH
    patterns:
      - pattern: fmt.Errorf("$FMT", ...)
      - metavariable-regex:
          metavariable: $FMT
          regex: '.*%w.*%w.*'
