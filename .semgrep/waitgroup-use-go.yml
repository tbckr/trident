rules:
  - id: trident-waitgroup-use-go
    languages: [go]
    severity: WARNING
    message: >-
      Don't write `wg.Add(1); go func() { defer wg.Done(); ... }()`. Project is
      on Go 1.26 — use `wg.Go(func() { ... })` instead (`sync.WaitGroup.Go` is
      available since Go 1.25). No `i := i` shadow needed either — auto-capture
      has been the loop semantics since Go 1.22.
    metadata:
      category: modernization
      confidence: MEDIUM
    patterns:
      - pattern: |
          $WG.Add(1)
          go func() {
            defer $WG.Done()
            ...
          }()
