rules:
  - id: trident-no-papmustparse-in-services
    languages: [go]
    severity: ERROR
    message: >-
      Don't re-parse the PAP limit with `pap.MustParse(d.cfg.PAPLimit)` in
      command/service code. The deps factory already computed the level once
      during init — read `d.papLevel` directly.
    metadata:
      category: convention
      confidence: HIGH
    paths:
      exclude:
        - "/internal/cli/deps.go"
        - "/internal/pap/**"
    pattern: pap.MustParse(d.cfg.PAPLimit)
