rules:
  - id: trident-strings-index-url-slash
    languages: [go]
    severity: WARNING
    message: >-
      Don't use `strings.Index(url, "/")` or `strings.IndexByte(url, '/')` to
      find the host/path boundary in a URL — both match the first `/` inside
      `://`, not the boundary. Find `://` first, skip 3 bytes, then search from
      there. See `output.DefangURL` for the correct pattern.
    metadata:
      category: correctness
      confidence: LOW
    pattern-either:
      - patterns:
          - pattern: strings.Index($URL, "/")
          - metavariable-regex:
              metavariable: $URL
              regex: '(?i).*(url|host).*'
      - patterns:
          - pattern: strings.IndexByte($URL, '/')
          - metavariable-regex:
              metavariable: $URL
              regex: '(?i).*(url|host).*'
