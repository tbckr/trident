rules:
  - id: trident-no-direct-httpclient-new
    languages: [go]
    severity: ERROR
    message: >-
      Don't call `httpclient.New(...)` from command or service code. Use the
      deps factory `d.newHTTPClient()` so proxy, user-agent, and logging stay
      consistent across the binary. The only legitimate direct callers are
      `internal/cli/deps.go` (the factory itself) and `internal/httpclient/*_test.go`.
    metadata:
      category: convention
      confidence: HIGH
    paths:
      exclude:
        - "/internal/cli/deps.go"
        - "/internal/httpclient/*_test.go"
    pattern: httpclient.New(...)
