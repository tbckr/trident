rules:
  - id: trident-httpmock-activate-scoped
    languages: [go]
    severity: ERROR
    message: >-
      Don't call bare `httpmock.Activate()` in tests. It patches the default
      `http.Client`, which doesn't intercept trident's `req.Client`. Use
      `httpmock.ActivateNonDefault(client.GetClient())` so the mock hits the
      actual transport — call `.GetClient()` to reach the inner `*http.Client`.
    metadata:
      category: testing
      confidence: HIGH
    paths:
      include:
        - "**/*_test.go"
    pattern: httpmock.Activate()
