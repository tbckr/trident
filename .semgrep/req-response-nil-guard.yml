rules:
  - id: trident-req-response-nil-guard
    languages: [go]
    severity: ERROR
    message: >-
      Don't access `.Response.StatusCode` or `.Response.Header` on a
      `*req.Response` without a nil-guard. On transport-level errors the outer
      `*req.Response` is non-nil but the embedded `*http.Response` is nil —
      touching the field will panic. Guard with `if resp.Response != nil { ... }`
      first, then read the field.
    metadata:
      category: correctness
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: $R.Response.StatusCode
          - pattern: $R.Response.Header
      - pattern-not-inside: |
          if $R.Response != nil {
            ...
          }
      - pattern-not-inside: |
          if $R.Response == nil {
            ...
          } else {
            ...
          }
