name: Betterleaks

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: betterleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: ghcr.io/betterleaks/betterleaks:v1.3.1@sha256:56d3f00627de20cdc14c7fad1cb91a3aeed3ac8c1c79d8977fe58808df138b71
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0  # full history so 'betterleaks git .' can scan all commits

      # Container runs as root but $GITHUB_WORKSPACE is bind-mounted with the
      # runner UID, so git fails with "dubious ownership" (CVE-2022-24765).
      # safe.directory via git config does not work here because betterleaks
      # spawns git with a cleared environment (no HOME → no global/system
      # config is read). The reliable fix is to align ownership with the
      # container user before scanning.
      - run: chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - run: betterleaks git . --report-format=sarif --report-path=betterleaks.sarif --redact --no-banner

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: betterleaks.sarif
