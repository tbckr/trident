name: Betterleaks

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: betterleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: ghcr.io/betterleaks/betterleaks:v1.2.0@sha256:0d438a2f5821f182bf1af1b2bb74bf3f79830c93291503c1fb90c19cab1ac5d6
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # full history so 'betterleaks git .' can scan all commits

      # Container runs as root but $GITHUB_WORKSPACE is bind-mounted with the
      # runner UID, so git fails with "dubious ownership" (CVE-2022-24765).
      # safe.directory via git config does not work here because betterleaks
      # spawns git with a cleared environment (no HOME → no global/system
      # config is read). The reliable fix is to align ownership with the
      # container user before scanning.
      - run: chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - run: betterleaks git . --report-format=sarif --report-path=betterleaks.sarif --redact --no-banner

      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        if: always()
        with:
          sarif_file: betterleaks.sarif
