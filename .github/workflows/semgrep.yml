name: Semgrep

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - ".semgrep/**"
      - ".semgrepignore"
      - ".github/workflows/semgrep.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - ".semgrep/**"
      - ".semgrepignore"
      - ".github/workflows/semgrep.yml"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.166.0@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - run: semgrep scan --config=.semgrep --config=p/golang --config=p/gosec --sarif --output=semgrep.sarif --error --metrics=off

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: semgrep.sarif
