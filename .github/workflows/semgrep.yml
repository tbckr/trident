name: Semgrep

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - ".semgrep/**"
      - ".semgrepignore"
      - ".github/workflows/semgrep.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - ".semgrep/**"
      - ".semgrepignore"
      - ".github/workflows/semgrep.yml"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.164.0@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - run: semgrep scan --config=.semgrep --config=p/golang --config=p/gosec --sarif --output=semgrep.sarif --error --metrics=off

      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        if: always()
        with:
          sarif_file: semgrep.sarif
