run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - gosec
    - misspell
    - revive
    - stylecheck
    - unconvert
    - goconst
    - gocritic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
